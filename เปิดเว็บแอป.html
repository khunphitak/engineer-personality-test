<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปิดเว็บแอป - แบบทดสอบสาขาวิศวกรรม</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { opacity: 0.9; line-height: 1.6; margin-bottom: 28px; font-size: 0.95rem; }
    .btn {
      display: inline-block;
      background: #fff;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .url { margin-top: 20px; font-size: 0.8rem; opacity: 0.7; }
    .note { margin-top: 24px; font-size: 0.78rem; opacity: 0.7; line-height: 1.5; }
    code { background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛠️ แบบทดสอบค้นหาสาขาวิศวกรรมที่ใช่</h1>
    <p>คลิกปุ่มด้านล่างเพื่อเปิดเว็บแอป</p>
    <a class="btn" href="http://localhost:5173" target="_blank" rel="noopener">เปิดเว็บแอป →</a>
    <div class="url">http://localhost:5173</div>
    <div class="note">
      ⚠️ ต้องรัน dev server ก่อน โดยเปิด Terminal แล้วพิมพ์<br>
      <code>npm run dev</code><br>หรือรันไฟล์ <code>start-dev.sh</code>
    </div>
  </div>
</body>
</html>
